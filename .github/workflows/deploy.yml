name: Deploy WOS-BOT

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run tests
        run: python -m pytest tests/ -q --tb=short
      
      - name: Build frontend
        run: |
          cd src/web/frontend
          npm install
          npm run build

  deploy-docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          load: true
          tags: wos-bot:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test container
        run: |
          docker run -d --name wos-bot-test \
            -e DISCORD_BOT_TOKEN=test \
            -e WEB_DASHBOARD_ENABLED=true \
            -p 8080:8080 \
            wos-bot:test
          sleep 15
          docker logs wos-bot-test
          docker stop wos-bot-test
